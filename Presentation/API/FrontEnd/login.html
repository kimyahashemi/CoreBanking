<!DOCTYPE html>
<html lang="eng">
<head>
    <title>Employee Login</title>
</head>
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #059669);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 430px;
            background: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.25);
        }

        .logo-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-title h2 {
            color: #1e3a8a;
            font-size: 30px;
            margin-bottom: 8px;
        }

        .logo-title p {
            color: #64748b;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #0f172a;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 13px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            outline: none;
            transition: 0.3s ease;
            font-size: 14px;
            background-color: #f8fafc;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #1e3a8a;
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.15);
            background: white;
        }

        .password-wrapper {
            display: flex;
            gap: 10px;
        }

        .password-wrapper input {
            flex: 1;
        }

        .show-btn {
            padding: 0 16px;
            border: none;
            border-radius: 10px;
            background: #0ea5e9;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .show-btn:hover {
            background: #0284c7;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #334155;
            font-size: 14px;
        }

        .captcha-section {
            text-align: center;
            margin-top: 10px;
        }

        .captcha-section img {
            width: 100%;
            max-width: 220px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            margin-bottom: 12px;
        }

        .refresh-btn {
            margin-top: 10px;
            background: #059669;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        .refresh-btn:hover {
            background: #047857;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .login-btn,
        .register-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .login-btn {
            background: #1e3a8a;
            color: white;
        }

        .login-btn:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .register-btn {
            background: #e2e8f0;
            color: #0f172a;
        }

        .register-btn:hover {
            background: #cbd5e1;
        }

        #result {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            color: #dc2626;
            font-size: 14px;
        }

        @media (max-width: 500px) {
            .login-container {
                padding: 25px;
            }

            .button-group {
                flex-direction: column;
            }

            .password-wrapper {
                flex-direction: column;
            }

            .show-btn {
                width: 100%;
                padding: 12px;
            }
        }
    </style>
</head>

<body>

<div class="login-container">

    <div class="logo-title">
        <h2>Core Banking System</h2>
        <p>Employee Secure Login Portal</p>
    </div>

    <form id="loginForm">

        <div class="form-group">
            <label>Username</label>
            <input id="username" type="text" required>
        </div>

        <div class="form-group">
            <label>Password</label>

            <div class="password-wrapper">
                <input id="password" type="password" required>

                <button
                    class="show-btn"
                    type="button"
                    onclick="togglePassword(event)">
                    Show
                </button>
            </div>
        </div>

        <div class="form-group remember">
            <input type="checkbox" id="rememberMe">
            <span>Remember me</span>
        </div>

        <div class="form-group captcha-section">
            <img id="captchaImage" src="/auth/captcha" alt="captcha">

            <input
                id="captchaInput"
                type="text"
                placeholder="Enter CAPTCHA"
                required>

            <button
                class="refresh-btn"
                type="button"
                onclick="refreshCaptcha()">
                Refresh CAPTCHA
            </button>
        </div>

        <div class="button-group">
            <button class="login-btn" type="submit">
                Login
            </button>

            <button
                class="register-btn"
                type="button"
                onclick="goToRegister()">
                Register
            </button>
        </div>
    </form>

    <p id="result"></p>

</div>

<script>
if (localStorage.getItem("remember") === "true") {
    document.getElementById("username").value =
        localStorage.getItem("username") || "";
    document.getElementById("rememberMe").checked = true;
}

document.getElementById("loginForm").addEventListener("submit", async function (event) {
    event.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const captcha  = document.getElementById("captchaInput").value;
    const remember = document.getElementById("rememberMe").checked;

    const response = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: username,
            password: password,
            captcha: captcha
        })
    });

    const data = await response.json();

    if (!response.ok) {
        document.getElementById("result").innerText =
            data.detail || "Login Failed";

        // refresh captcha (same as generate_captcha())
        document.getElementById("captchaImage").src =
            "/auth/captcha?" + Date.now();
        return;
    }

    if (remember) {
        localStorage.setItem("remember", "true");
        localStorage.setItem("username", username);
    } else {
        localStorage.clear();
    }
    localStorage.setItem("employee", JSON.stringify(data.employee));
    localStorage.setItem("access_token", data.access_token);
    window.location.href = "/home";});
function refreshCaptcha() {
        const img = document.getElementById("captchaImage");
        img.src = "/auth/captcha?ts=" + new Date().getTime();}
function togglePassword() {
    const passwordField = document.getElementById("password");
    const button = event.target;
    if (passwordField.type === "password") {
        passwordField.type = "text";
        button.textContent = "Hide";
    } else {
        passwordField.type = "password";
        button.textContent = "Show";}}
function goToRegister() {
    window.location.href = "/auth/register";}
</script>

</body>
</html>
